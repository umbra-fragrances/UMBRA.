<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMBRA | Exclusive Fragrances</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Cinzel', serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 15px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            animation: fadeIn 2s ease-in-out;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 8px;
            color: #a4a4a4;
            text-transform: uppercase;
            margin-bottom: 50px;
            display: block;
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 4px;
            transition: all 0.5s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            border-color: #fff;
            background: #fff;
            color: #000;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h1>UMBRA</h1>
        <span class="subtitle">Elevate Your Scent</span>
        <br>
        <a href="https://wa.me/34636265430?text=Hola,%20me%20gustaría%20ver%20el%20catálogo%20de%20perfumes%20de%20UMBRA." class="btn">ENTER THE VAULT</a>
    </div>
</body>
</html>

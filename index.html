<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMBRA | Exclusive Fragrances</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ajuste de tamaño para que no ocupe toda la pantalla */
        .logo-img {
            width: 100%;
            max-width: 400px; 
            height: auto;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(156, 132, 65, 0.2));
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: #9c8441;
            text-transform: uppercase;
            margin-bottom: 60px; /* Espacio para que no se pise con el botón */
            font-weight: 200;
            opacity: 0.9;
        }

        /* Botón estilizado y con espacio */
        .btn {
            display: inline-block;
            padding: 16px 50px;
            border: 1px solid #9c8441;
            color: #9c8441;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            background: transparent;
        }

        .btn:hover {
            background: #9c8441;
            color: #000;
            box-shadow: 0 0 30px rgba(156, 132, 65, 0.3);
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.55rem;
            letter-spacing: 3px;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="UMBRA LOGO" class="logo-img">
        
        <p class="subtitle">ELEVATE YOUR SCENT</p>
        
        <a href="https://wa.me/34636265430?text=Hola,%20me%20gustaría%20ver%20el%20catálogo%20de%20perfumes." class="btn">
            ENTER THE VAULT
        </a>
    </div>

    <footer>
        ESPARREGUERA | EXCLUSIVE FRAGRANCES
    </footer>

</body>
</html>
